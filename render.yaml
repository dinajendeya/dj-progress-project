services:
  - type: web
    name: dj-progress-website
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: ""
      - key: PYTHON_VERSION
        value: "3.13.3"
      - key: WEB_CONCURRENCY
        value: "3"
      - key: DATABASE_URL
        fromDatabase:
          name: dj-progress-db
          property: connectionString

databases:
  - name: dj-progress-db
    plan: free
    databaseName: dj_progress
